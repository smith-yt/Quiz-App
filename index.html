<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">

        <section class="screen active" id="start-screen">
            <h1>Quiz Time!</h1>
            <p>Test your knowledge with these fun questions.</p>
            <button id="start-btn">Start Quiz</button>
        </section>

        <section class="screen" id="quiz-screen">
            <header class="quiz-header">
                <h2 id="question-text"></h2>
                <div class="quiz-info">
                    <p>Question <span id="current-question">1</span> of <span id="total-questions">5</span> </p>
                    <p >Score: <span id="score">0</span> </p>
                    <p >LeftTime:<span id="timer"></span></p>
                </div>
            </header>
            <div class="answer-container" id="answer-container"></div>
            <div class="progress-bar">
                <div id="progress"></div>
            </div>
            <div>
                 <button id="next-btn"></button>
            </div>
        </section>

        <section class="screen" id="result-screen">
            <h1>Quiz Results</h1>
            <div class="result-info">
                <p >You scored <span id="final-score">3</span> of <span id="max-score">5</span> </p>
                <h2 id="result-message"> </h2>
            </div>
            <button id="restart-button">Restart Quiz</button>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
